name: Daily latest package notification

on:
  schedule:
    # 23:00 UTC == 08:00 KST (next day).
    - cron: "0 23 * * *"
  workflow_dispatch:
  repository_dispatch:
    # Triggered by Slack /새로고침 via Cloudflare Worker bridge.
    types: [slack-refresh]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python fetch_latest.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PACKAGE_KEYWORD: ${{ github.event.client_payload.keyword }}
